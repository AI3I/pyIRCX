[pytest]
# pyIRCX Test Configuration
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (no server required)
    integration: Integration tests (requires running server)
    slow: Slow tests (network/load tests)
    api: API endpoint tests
    asyncio: Asyncio-based tests

# Output settings
addopts = -v --tb=short --strict-markers

# Ignore integration tests by default (require server)
# Run with: pytest -m "not integration" for unit tests only
# Run with: pytest -m integration for integration tests

# Test discovery
norecursedirs = .git __pycache__ docs *.egg-info .tox .venv
