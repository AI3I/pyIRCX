// Channel modes modal
function openModesModal() {
    if (!currentChannel || !isChannel(currentChannel)) return;
    const ch = getChannel(currentChannel);
    const modes = [
        {key:'n',name:'No External',desc:'Block messages from outside'},
        {key:'t',name:'Topic Lock',desc:'Only hosts can change topic'},
        {key:'i',name:'Invite Only',desc:'Require invitation to join'},
        {key:'m',name:'Moderated',desc:'Only hosts/voice can speak'},
        {key:'p',name:'Private',desc:'Hide from channel list'},
        {key:'s',name:'Secret',desc:'Hide from user WHOIS'},
        {key:'a',name:'Admin Only',desc:'Only admins can join'},
        {key:'d',name:'Clone Parent',desc:'Enable as clone source'},
        {key:'f',name:'Strip Formatting',desc:'Strip text formatting codes'},
        {key:'g',name:'Guide Op',desc:'Auto-grant owner to guides'},
        {key:'h',name:'Hidden',desc:'Hide from normal LIST'},
        {key:'j',name:'No Invitations',desc:'Block INVITE command'},
        {key:'u',name:'Knock Mode',desc:'Allow KNOCK to request entry'},
        {key:'w',name:'No Whisper',desc:'Block WHISPER command'},
        {key:'x',name:'Auditorium',desc:'Hide user list from non-ops'},
        {key:'y',name:'Transcript',desc:'Log all messages'}
    ];

    $('modesContent').innerHTML = modes.map((m, idx) => `
        <label class="mode-row" style="display: flex; align-items: flex-start; padding: 12px 16px; ${idx < modes.length - 1 ? 'border-bottom: 1px solid var(--border-color);' : ''} gap: 12px; cursor: pointer; transition: background 0.15s;">
            <input type="checkbox" id="mode-${m.key}" ${ch.modes[m.key] ? 'checked' : ''} style="width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; cursor: pointer;">
            <div style="flex: 1; pointer-events: none;">
                <div style="font-weight: 600; margin-bottom: 4px;"><span style="color: var(--accent); font-family: monospace;">+${m.key}</span> ${m.name}</div>
                <div style="font-size: 13px; color: var(--text-muted);">${m.desc}</div>
            </div>
        </label>
    `).join('');
    $('modesModal').classList.remove('hidden');
}

function saveChannelModes() {
    if (!currentChannel || !isChannel(currentChannel)) return;
    const ch = getChannel(currentChannel);
    const modes = ['n','t','i','m','p','s','a','d','f','g','h','j','u','w','x','y'];
    let add = '', remove = '';

    modes.forEach(m => {
        const checked = $('mode-' + m)?.checked || false;
        const current = ch.modes[m] || false;
        if (checked && !current) add += m;
        if (!checked && current) remove += m;
    });

    if (add) queueCmd(`MODE ${currentChannel} +${add}`);
    if (remove) queueCmd(`MODE ${currentChannel} -${remove}`);
    $('modesModal').classList.add('hidden');
}

// PROP editor modal
function openPropModal() {
    if (!currentChannel || !isChannel(currentChannel)) return;
    const ch = getChannel(currentChannel);
    $('propTopic').value = ch.props.TOPIC || ch.topic || '';
    $('propSubject').value = ch.props.SUBJECT || '';
    $('propOwnerkey').value = ch.props.OWNERKEY || '';
    $('propHostkey').value = ch.props.HOSTKEY || '';
    $('propVoicekey').value = ch.props.VOICEKEY || '';
    $('propMemberkey').value = ch.props.MEMBERKEY || '';
    $('propModal').classList.remove('hidden');
}

function savePropModal() {
    if (!currentChannel || !isChannel(currentChannel)) return;

    // Handle topic separately with TOPIC command
    const topic = $('propTopic').value;
    if (topic) {
        queueCmd(`TOPIC ${currentChannel} :${topic}`);
    } else {
        queueCmd(`TOPIC ${currentChannel} :`); // Clear topic
    }

    // Handle other properties with PROP commands
    const props = {
        SUBJECT: $('propSubject').value,
        OWNERKEY: $('propOwnerkey').value,
        HOSTKEY: $('propHostkey').value,
        VOICEKEY: $('propVoicekey').value,
        MEMBERKEY: $('propMemberkey').value
    };

    Object.entries(props).forEach(([key, val]) => {
        if (val) queueCmd(`PROP ${currentChannel} ${key} :${val}`);
        else queueCmd(`PROP ${currentChannel} ${key}`); // Clear if empty
    });

    $('propModal').classList.add('hidden');
}

// Message search
function openSearch() {
    if (!currentChannel) return;
    $('searchInput').value = '';
    $('searchResults').innerHTML = '';
    $('searchModal').classList.remove('hidden');
    $('searchInput').focus();
}

function performSearch() {
    const query = $('searchInput').value.toLowerCase();
    if (!query || !currentChannel) {
        $('searchResults').innerHTML = '';
        return;
    }

    const ch = getChannel(currentChannel);
    const results = ch.messages.filter(m => m.textContent.toLowerCase().includes(query));

    if (results.length === 0) {
        $('searchResults').innerHTML = '<p style="color: var(--text-muted); text-align: center;">No results found</p>';
    } else {
        $('searchResults').innerHTML = results.map(m => {
            const clone = m.cloneNode(true);
            clone.style.padding = '6px';
            clone.style.borderBottom = '1px solid var(--border-color)';
            return clone.outerHTML;
        }).join('');
    }
}

function closePrivateChat(nick) {
    const lower = nick.toLowerCase();
    if (channels[lower]) {
        delete channels[lower];
        // If we're viewing this PM, switch to another channel
        if (currentChannel.toLowerCase() === lower) {
            const remaining = Object.keys(channels);
            if (remaining.length > 0) {
                switchChannel(channels[remaining[0]].name);
            } else {
                currentChannel = '';
                $('messages').innerHTML = '';
                $('chatTitle').textContent = 'No channel';
                $('chatTopic').textContent = '';
            }
        }
        renderChannelList();
    }
}

// Autocomplete state
let autocompleteIndex = -1;
let autocompleteMatches = [];
let autocompletePrefix = '';

// Handle tab autocomplete
function handleAutocomplete(e) {
    if (e.key !== 'Tab') {
        autocompleteIndex = -1;
        autocompleteMatches = [];
        autocompletePrefix = '';
        return;
    }
    e.preventDefault();

    const input = $('messageInput');
    const text = input.value.substring(0, input.selectionStart);
    const words = text.split(/\s+/);
    const lastWord = words[words.length - 1];

    // First tab - build matches
    if (autocompleteIndex === -1) {
        autocompletePrefix = lastWord.toLowerCase();
        autocompleteMatches = [];

        // Commands (if starts with /)
        if (lastWord.startsWith('/')) {
            const commands = ['join', 'part', 'msg', 'nick', 'me', 'topic', 'kick', 'ban', 'mode', 'owner', 'host', 'voice', 'invite', 'whois', 'who', 'list', 'prop', 'access', 'whisper', 'away', 'quit', 'clear', 'raw', 'help'];
            autocompleteMatches = commands.filter(c => ('/' + c).startsWith(autocompletePrefix)).map(c => '/' + c);
        } else {
            // Nicknames from current channel
            const ch = getChannel(currentChannel);
            if (ch && !ch.isPrivate) {
                const nicks = [...ch.users.keys()];
                autocompleteMatches = nicks.filter(n => n.toLowerCase().startsWith(autocompletePrefix));
            }
        }

        if (autocompleteMatches.length === 0) return;
        autocompleteIndex = 0;
    } else {
        // Cycle through matches
        autocompleteIndex = (autocompleteIndex + 1) % autocompleteMatches.length;
    }

    // Replace last word with match
    const match = autocompleteMatches[autocompleteIndex];
    words[words.length - 1] = match + (words.length === 1 && !match.startsWith('/') ? ': ' : ' ');
    input.value = words.join(' ') + input.value.substring(input.selectionStart);
    input.selectionStart = input.selectionEnd = words.join(' ').length;
}
